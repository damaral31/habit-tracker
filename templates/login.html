{% extends "base.html" %}

{% block title %}Login - Healthy Habit Tracker{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg border border-gray-700 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-green-400 mb-6">Login</h2>
        
        <form method="POST" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-400">Utilizador</label>
                <input type="text" id="username" name="username" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-400">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition-colors">
                Entrar
            </button>
        </form>
        
        <p class="text-center text-gray-500 mt-4 text-sm">
            Contacte o administrador para criar uma conta.
        </p>
    </div>
</div>
{% endblock %}
